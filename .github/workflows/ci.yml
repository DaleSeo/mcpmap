name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15
      - run: bun install --frozen-lockfile
      - name: Format
        run: bun run format:check
      - name: Lint
        run: bun run lint
      # Build first: it generates src/routeTree.gen.ts, which typecheck needs.
      - name: Build
        run: bun run build
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun run test
