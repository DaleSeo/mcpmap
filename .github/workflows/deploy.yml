name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

# Gated on the DEPLOY_ENABLED repo variable so main stays green until the
# Cloudflare secrets exist. After adding CLOUDFLARE_API_TOKEN and
# CLOUDFLARE_ACCOUNT_ID (see docs/deploy.md), set:
#   gh variable set DEPLOY_ENABLED --body true --repo DaleSeo/mcpmap
jobs:
  deploy:
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15
      - run: bun install --frozen-lockfile
      - run: bun run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
